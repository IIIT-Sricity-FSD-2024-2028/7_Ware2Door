<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WARE2DOOR — Admin Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="logo-img">
      <a href="../NEW LANDING/index.html"
        ><img src="logo.png" alt="Ware2Door Logo"
      /></a>
    </div>

    <div class="form-element">
      <h2>Welcome Back</h2>
      <span class="sub-title">Logistics Management Portal Access</span>
      <span>Select your role</span>
      <div class="role-selector">
        <div class="role-option active">Warehouse admin</div>
        <div class="role-option">Transit Hub manager</div>
        <div class="role-option">Delivery agency</div>
      </div>
      <span class="sp-txt">Email Address</span>
      <div class="input-group">
        <i class="fa-regular fa-envelope"></i>
        <input
          type="email"
          placeholder="name@company.com"
          class="email-input"
        />
      </div>
      <span class="sp-txt">Password</span>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input
          type="password"
          placeholder="Enter password"
          class="password-input"
        />
        <i class="fa-regular fa-eye toggle-password"></i>
      </div>
      <a href="forgot.html"
        ><button class="frgt-btn">Forgot Password?</button></a
      >
      <button class="login-btn">Login to Portal</button>
    </div>

    <div class="footer-note">
      <span
        >For collaborations or support, contact us at
        <a href="mailto:support@ware2door.com">support@ware2door.com</a></span
      >
    </div>

    <script src="script.js"></script>
  </body>
</html>
